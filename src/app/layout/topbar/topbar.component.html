<header class="topbar">
    <div class="topbar__left">
        <button type="button" class="topbar__menu-button" aria-label="Abrir o cerrar menú principal"
            [attr.aria-expanded]="menuExpanded()" [attr.aria-controls]="menuControls()" (click)="onMenuToggle()">
            Menú
        </button>

        <div class="topbar__page">
            <span class="topbar__system-name">CapitalPOS</span>
            <h1 class="topbar__title">{{ pageTitle() }}</h1>
        </div>
    </div>

    <div class="topbar__right">
        <button type="button" class="topbar__notification-button" aria-label="Ver notificaciones">
            Notificaciones

            @if (notificationCount() > 0) {
            <span class="topbar__notification-count">
                {{ notificationCount() }}
            </span>
            }
        </button>

        <div class="topbar__user">
            <span class="topbar__user-label">Usuario</span>
            <strong class="topbar__user-name">{{ userName() }}</strong>
            @if (empresaId()) {
            <span class="topbar__company">Empresa {{ empresaId() }}</span>
            } @else {
            <span class="topbar__company topbar__company--missing">Selecciona una empresa</span>
            }
        </div>

        <button type="button" class="topbar__logout-button" (click)="onLogout()">
            Salir
        </button>
    </div>
</header>
